<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Badge icon -->
  <rect width="44" height="44" rx="11" fill="url(#badge)"/>
  <!-- Q mark -->
  <text x="22" y="28" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="900" fill="white">Q</text>
  <!-- small ? superscript -->
  <text x="35" y="17" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="rgba(255,255,255,0.7)">?</text>
  <!-- Brand name -->
  <text x="56" y="19" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#e2e8f0">QuizBytes</text>
  <text x="56" y="36" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700" fill="#a855f7">Daily</text>
</svg>
